<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
  .my-carousel img {
    height: 350px;
    object-fit:cover;
    border-radius: 5px;
     

}
body{
    background-color: #f7f3e8;

}
    .cards{
    display: flex;
    justify-content: space-evenly;
   
    padding:  30px;
    height: 350px;

}
a{
    background-color: #c9c6c6;
    border-radius: 10px;
    padding: 10px;
    margin: 20px;
    color: black;
}

    .card{
        border: 2px solid rgb(107, 107, 107);
        text-align: center;
        
        padding: px;
        width: 200px;
        background-color: #f4f6e8;
}
nav{
    display: flex;
    justify-content: center;
    background-color: #fff;
    padding: 0px;
}

</style>

  
</head>
<body>

    <div id="demo" class="carousel slide my-carousel" data-bs-ride="carousel">

  <!-- indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button >
  </div>

  <!-- slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://i.pinimg.com/1200x/5b/87/e9/5b87e9bbe3137fa616b6627404e1a70e.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://i.pinimg.com/1200x/6c/9c/cf/6c9ccf0f431953497d608c83a349ed73.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="https://i.pinimg.com/736x/cf/49/61/cf496152b2b05f365c8e539befbac2da.jpg" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="https://i.pinimg.com/1200x/bc/f7/3c/bcf73c64514d0da38b14e82c0d153bf9.jpg" class="d-block w-100">
    </div>
  </div>

  <!-- controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>
 
<section>

    <div class="cards">
        <div class="card card1">
            <img src="https://i.pinimg.com/736x/7a/d1/50/7ad150f69a5460c252a5098467c50914.jpg" alt="">
            <h2>Tokyo revenger</h2>
            <a type="button" href="https://hianime.to/tokyo-revengers-tenjiku-hen-uncensored-18627"target="_blank">watch now </a>
            
        </div>
        
    <div class="card card2">
        <img src="https://i.pinimg.com/1200x/c1/ce/33/c1ce33648dd2a93d9d0e7724f20db186.jpg" target="_blank" alt="">
        <h2>Jujustu kaisen</h2>
        <a type="button" href="https://hianime.to/watch/jujutsu-kaisen-the-culling-game-part-1-20401" target="_blank" >watch now </a>
        
    </div>
    <div class="card card3">
        <img src="https://i.pinimg.com/736x/f4/8c/a2/f48ca263d89b3a13ca10b259b98ff308.jpg" alt="">
        <h2>Demon Slayer </h2>
        <a type="button" href="https://hianime.to/demon-slayer-mt-natagumo-arc-17858" target="_blank">watch now </a>
        
    </div>
    
</div>

</body>
</html>
